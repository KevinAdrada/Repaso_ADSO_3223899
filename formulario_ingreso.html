<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="/estilos/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/index.html">← Volver</a>
        </nav>
    </header>

    <main>
        <section>
            <h1>Iniciar Sesión</h1>
            <form action="/login" method="get">
                
                <label for="user">Nombre de usuario:</label><br>
                <input type="text" id="user" name="user" placeholder="Usuario o correo" required>
                <br><br>

                <label for="email">Correo electrónico:</label><br>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                <br><br>

                <label for="pass">Contraseña:</label><br>
                <input type="password" id="pass" name="pass" placeholder="Ingresa tu contraseña" required>
                <br><br>

                <label for="confirm_pass">Confirmar contraseña:</label><br>
                <input type="password" id="confirm_pass" name="confirm_pass" placeholder="Repite tu contraseña" required>
                <br><br>

                <button type="submit">Ingresar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Kevin Santiago Adrada Montilla - 3223899</p>
    </footer>
</body>
</html>
